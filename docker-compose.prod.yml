services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-vani_admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER:-vani_admin}", "-p", "${MONGO_PASS}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vani-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vani-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-vani_admin}:${MONGO_PASS}@mongo:27017/contrastive_voice?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FASTAPI_URL=http://engine:8000
      - JWT_SECRET=${JWT_SECRET}
      - ENGINE_API_KEY=${ENGINE_API_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://vaaani.in}
      - NODE_ENV=production
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-noop}
      - EMAIL_FROM=${EMAIL_FROM:-Vaani <hello@vaaani.in>}
      - EMAIL_REPLY_TO=${EMAIL_REPLY_TO:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vani-network

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    expose:
      - "8000"
    volumes:
      - ./uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
      - whisper_cache:/root/.cache/whisper
    environment:
      - ENGINE_API_KEY=${ENGINE_API_KEY}
      - MONGO_URI=mongodb://${MONGO_USER:-vani_admin}:${MONGO_PASS}@mongo:27017/contrastive_voice?authSource=admin
      - CUDA_VISIBLE_DEVICES=0
      - ENVIRONMENT=production
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vani-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - API_URL=http://server:3001
    depends_on:
      server:
        condition: service_healthy
    networks:
      - vani-network

networks:
  vani-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  hf_cache:
  torch_cache:
  whisper_cache:
