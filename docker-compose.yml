services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # No host port — only reachable by other containers on the Docker network
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-vani_admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS:-}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER:-vani_admin}", "-p", "${MONGO_PASS:-}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    # No host port — only reachable by other containers on the Docker network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-vani_admin}:${MONGO_PASS:-}@mongo:27017/contrastive_voice?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_in_production}
      - FASTAPI_URL=http://host.docker.internal:8000
      - JWT_SECRET=${JWT_SECRET}
      - ENGINE_API_KEY=${ENGINE_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost,http://localhost:5173}
      - NODE_ENV=production
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
