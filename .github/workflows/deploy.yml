name: Deploy

on:
  push:
    branches: [main]

jobs:
  verify:
    name: Verify production health
    runs-on: ubuntu-latest
    steps:
      - name: Check API gateway
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.vaaani.in/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "✓ api.vaaani.in healthy ($STATUS)"
          else
            echo "⚠ api.vaaani.in returned $STATUS (gateway may be restarting)"
          fi

      - name: Check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://app.vaaani.in)
          if [ "$STATUS" = "200" ]; then
            echo "✓ app.vaaani.in healthy ($STATUS)"
          else
            echo "✗ app.vaaani.in returned $STATUS"
            exit 1
          fi

  notify:
    name: Notify on failure
    needs: verify
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment health check failed
        run: echo "Production health check failed — investigate at https://github.com/${{ github.repository }}/actions"
